<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anuary & Khan Msafi Gaming</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* BADILISHA RANGI HAPA */
            --main-bg: #0b0b0d;
            --card-bg: #161618;
            --primary-gradient: linear-gradient(135deg, #ff007a 0%, #ff5e00 100%);
            --whatsapp-green: #25d366;
            --text-white: #ffffff;
            --text-gray: #a0a0a0;
        }

        body {
            background-color: var(--main-bg);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Top Hero */
        .hero-section {
            width: 100%;
            height: 350px;
            background: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=500') center/cover;
            position: relative;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .hero-overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 40px 20px 20px;
            background: linear-gradient(transparent, var(--main-bg));
        }

        .game-info h1 { margin: 0; font-size: 28px; }
        .rating { color: #f1c40f; font-size: 14px; margin: 5px 0; }

        /* Pricing Card */
        .pricing-bar {
            background: var(--primary-gradient);
            margin: 15px;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 13px;
        }

        /* Feature Cards */
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 15px;
        }

        .f-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .f-card i {
            color: #ff007a;
            font-size: 20px;
        }

        .f-text h4 { margin: 0; font-size: 12px; text-transform: uppercase; }
        .f-text p { margin: 0; font-size: 10px; color: var(--text-gray); }

        /* Game Grid */
        .more-games {
            padding: 20px 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .g-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            transition: 0.3s;
        }

        .g-card img { width: 100%; height: 220px; object-fit: cover; }
        
        .tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 255, 127, 0.8);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: bold;
        }

        /* Floating WhatsApp Button */
        .wa-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: var(--whatsapp-green);
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            text-decoration: none;
            color: white;
            font-size: 30px;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="hero-section">
        <div class="hero-overlay">
            <div class="game-info">
                <h1><i class="fas fa-gamepad"></i> Dead Cells</h1>
                <div class="rating">
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star-half-alt"></i>
                    <span>4.9</span>
                </div>
                <p style="color: var(--text-gray); font-size: 12px;">Simple and clear install and play</p>
            </div>
        </div>
    </div>

    <div class="pricing-bar">
        <span>MOBILE GAMES</span>
        <span>•</span>
        <span>MWEZI: TZS 10,000</span>
        <span>•</span>
        <span>MWAKA: TZS 20,000</span>
    </div>

    <div class="features">
        <div class="f-card">
            <i class="fas fa-shield-alt"></i>
            <div class="f-text">
                <h4>Malipo Salama</h4>
                <p>M-PESA | AIRTEL</p>
            </div>
        </div>
        <div class="f-card">
            <i class="fas fa-bolt"></i>
            <div class="f-text">
                <h4>Delivery Haraka</h4>
                <p>PAPO KWA PAPO</p>
            </div>
        </div>
    </div>

    <div class="more-games">
        <h3 style="font-size: 16px;">GAMES ZINGINE</h3>
        <div class="grid">
            <div class="g-card">
                <span class="tag">MOBILE</span>
                <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=200" alt="GTA">
            </div>
            <div class="g-card">
                <span class="tag" style="background: #a29bfe;">PC</span>
                <img src="https://images.unsplash.com/photo-1552824734-8e62128b33a2?q=80&w=200" alt="Tomb Raider">
            </div>
        </div>
    </div>
</div>

<a href="https://wa.me/255785365824?text=Habari,%20nataka%20kufanya%20malipo%20kwa%20ajili%20ya%20Game" class="wa-btn" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

</body>
</html>
