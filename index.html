<style>
    /* Rangi ya menu icon kama kwenye picha */
    .menu-icon { color: #ff007a; font-size: 28px; }

    /* Search bar iliyokaa kama ya picha yako */
    .search-bar input {
        width: 100%;
        background: #1a1a1d;
        border: 1px solid #333;
        padding: 12px 20px 12px 45px;
        border-radius: 30px;
        color: white;
    }

    /* Vitufe vya kuchuja (Filter buttons) */
    .nav-item {
        cursor: pointer;
        transition: 0.3s;
        border: 1px solid #333;
        background: #1a1a1d;
    }

    /* Kitufe kilichochaguliwa (Kama "Zote" kwenye picha) */
    .nav-item.active {
        background: linear-gradient(90deg, #ff007a, #ff5e00);
        border: none;
    }

    /* Kuficha vitu ambavyo havijachaguliwa */
    .hidden { display: none !important; }
</style>

<script>
    // 1. Kazi ya Search Bar
    const searchInput = document.querySelector('.search-bar input');
    searchInput.addEventListener('keyup', (e) => {
        const value = e.target.value.toLowerCase();
        const allCards = document.querySelectorAll('.card, .news-item');

        allCards.forEach(card => {
            const title = card.innerText.toLowerCase();
            if (title.includes(value)) {
                card.classList.remove('hidden');
            } else {
                card.classList.add('hidden');
            }
        });
    });

    // 2. Kazi ya Vitufe (Zote, Games, Movies, Sports News)
    const filterButtons = document.querySelectorAll('.nav-item');
    const contentItems = document.querySelectorAll('.card, .news-item');

    filterButtons.forEach(button => {
        button.addEventListener('click', () => {
            // Badilisha rangi ya kitufe kilichobonyezwa
            filterButtons.forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');

            const filterValue = button.textContent.trim().toLowerCase();

            contentItems.forEach(item => {
                // Ikiwa ni "Zote", onyesha kila kitu
                if (filterValue === 'zote') {
                    item.classList.remove('hidden');
                } 
                // Kuchuja kulingana na aina
                else if (item.innerText.toLowerCase().includes(filterValue)) {
                    item.classList.remove('hidden');
                } else {
                    item.classList.add('hidden');
                }
            });
        });
    });
</script>
