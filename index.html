<!DOCTYPE html>
<html>
<head>
<title>Khan Gaming</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

/* HEADER */

header{
background:#111;
text-align:center;
padding:20px;
}

header h1{
color:orange;
margin:0;
}

/* MENU BUTTON */

.menu-btn{
font-size:26px;
background:orange;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
position:fixed;
top:15px;
left:15px;
}

/* SIDEBAR */

.sidebar{
height:100%;
width:0;
position:fixed;
top:0;
left:0;
background:#111;
overflow-x:hidden;
transition:0.4s;
padding-top:60px;
}

.sidebar a{
padding:12px 25px;
display:block;
color:white;
text-decoration:none;
font-size:18px;
}

.sidebar a:hover{
background:orange;
}

.closebtn{
position:absolute;
top:10px;
right:20px;
font-size:30px;
}

/* SEARCH */

.search{
text-align:center;
margin:30px;
}

.search input{
width:80%;
padding:15px;
border-radius:30px;
border:2px solid orange;
font-size:16px;
}

/* CONTENT */

.container{
padding:20px;
}

.section-title{
color:orange;
font-size:26px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:#111;
border-radius:12px;
overflow:hidden;
text-align:center;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.download{
display:inline-block;
background:orange;
color:black;
padding:10px 20px;
margin:10px;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

/* TRAILER */

iframe{
width:100%;
height:220px;
border:none;
border-radius:10px;
}

/* FOOTER */

footer{
background:#111;
text-align:center;
padding:20px;
margin-top:40px;
color:#aaa;
}

</style>
</head>

<body>

<button class="menu-btn" onclick="openMenu()">☰</button>

<div id="sidebar" class="sidebar">

<a href="javascript:void(0)" class="closebtn" onclick="closeMenu()">×</a>

<a href="#">🏠 Home</a>
<a href="#">📱 Game za Simu</a>
<a href="#">💻 Game za PC</a>
<a href="#">🎮 PS2 Games</a>
<a href="#">📚 Pata Elimu</a>
<a href="#">📞 Contact</a>

</div>

<header>
<h1>🎮 Khan Gaming</h1>
<p>Download Android Games, Apps na PS2 Games bure</p>
</header>

<div class="search">
<input type="text" placeholder="Search games...">
</div>

<div class="container">

<h2 class="section-title">🎮 Android Games</h2>

<div class="grid">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/en/c/c4/GTASABOX.jpg">
<h3>GTA San Andreas</h3>
<a class="download" href="#">Download</a>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/en/5/5e/PUBG_Mobile.jpg">
<h3>PUBG Mobile</h3>
<a class="download" href="#">Download</a>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/en/0/03/Minecraft_box_art.png">
<h3>Minecraft</h3>
<a class="download" href="#">Download</a>
</div>

</div>

<h2 class="section-title">🎬 Game Trailer</h2>

<iframe src="https://www.youtube.com/embed/QkkoHAzjnUs"></iframe>

</div>

<footer>
<p>© 2026 Khan Gaming</p>
</footer>

<script>

function openMenu(){
document.getElementById("sidebar").style.width="250px";
}

function closeMenu(){
document.getElementById("sidebar").style.width="0";
}

</script>

</body>
</html>
