<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khan Studio | Entertainment Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0b0d;
            --card-bg: #161618;
            --accent-pink: #ff007a;
            --accent-orange: #ff5e00;
            --text-white: #ffffff;
            --text-gray: #a1a1aa;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* --- DRAWER MENU --- */
        .sidebar {
            height: 100%; width: 0; position: fixed; z-index: 1001;
            top: 0; left: 0; background-color: var(--card-bg);
            transition: 0.4s; padding-top: 60px; overflow-x: hidden;
        }
        .sidebar a {
            padding: 15px 25px; text-decoration: none; font-size: 18px;
            color: white; display: block; border-bottom: 1px solid #222;
        }
        .sidebar .closebtn { position: absolute; top: 10px; right: 25px; font-size: 36px; cursor: pointer; }
        .overlay { display: none; position: fixed; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }

        /* --- HEADER & SEARCH (Kama picha uliyotuma) --- */
        header { padding: 15px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; background: var(--bg-color); z-index: 999; }
        .menu-btn { font-size: 26px; color: var(--accent-pink); cursor: pointer; }
        .search-container { flex-grow: 1; position: relative; }
        .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-gray); }
        .search-container input {
            width: 90%; background: #1c1c1f; border: 1px solid #333;
            padding: 12px 12px 12px 45px; border-radius: 30px; color: white; outline: none;
        }

        /* --- TABS --- */
        .tabs { display: flex; gap: 10px; padding: 10px 15px; overflow-x: auto; scrollbar-width: none; }
        .tab {
            background: #1c1c1f; padding: 10px 25px; border-radius: 25px;
            font-size: 14px; cursor: pointer; border: 1px solid #333; white-space: nowrap;
        }
        .tab.active { background: linear-gradient(90deg, var(--accent-pink), var(--accent-orange)); border: none; font-weight: bold; }

        /* --- CONTENT --- */
        .content { padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--card-bg); border-radius: 20px; overflow: hidden; position: relative; margin-bottom: 10px; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .badge { position: absolute; top: 10px; right: 10px; background: #2ecc71; padding: 3px 8px; border-radius: 8px; font-size: 10px; font-weight: bold; color: black;}
        
        .news-card { display: flex; background: var(--card-bg); padding: 12px; border-radius: 15px; gap: 12px; margin-bottom: 15px; align-items: center;}
        .news-card img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; }
        
        .hidden { display: none !important; }

        /* --- WHATSAPP --- */
        .wa-float {
            position: fixed; bottom: 25px; right: 25px; background: #25d366;
            width: 60px; height: 60px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 30px; color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1002;
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeNav()"></div>

<div id="mySidebar" class="sidebar">
    <span class="closebtn" onclick="closeNav()">&times;</span>
    <a href="#"><i class="fas fa-home"></i> Nyumbani</a>
    <a href="#"><i class="fas fa-gamepad"></i> Game Store</a>
    <a href="#"><i class="fas fa-film"></i> Movies</a>
    <a href="#"><i class="fas fa-newspaper"></i> Sports News</a>
    <a href="https://wa.me/255785365824"><i class="fab fa-whatsapp"></i> Wasiliana Nasi</a>
</div>

<header>
    <div class="menu-btn" onclick="openNav()"><i class="fas fa-bars"></i></div>
    <div class="search-container">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Tafuta Games, Movies...">
    </div>
</header>

<div class="tabs">
    <div class="tab active" onclick="filterContent('zote', this)">Zote</div>
    <div class="tab" onclick="filterContent('games', this)">Games</div>
    <div class="tab" onclick="filterContent('movies', this)">Movies</div>
    <div class="tab" onclick="filterContent('habari', this)">Sports News</div>
</div>

<div class="content">
    <div class="grid" id="mainGrid">
        <div class="card item" data-category="games">
            <span class="badge">MOBILE</span>
            <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=400" alt="GTA">
            <div style="padding:10px; font-size:14px; font-weight:bold;">GTA V Mobile</div>
        </div>
        <div class="card item" data-category="games">
            <span class="badge" style="background:#a29bfe;">PC</span>
            <img src="https://images.unsplash.com/photo-1552824734-8e62128b33a2?q=80&w=400" alt="Tomb Raider">
            <div style="padding:10px; font-size:14px; font-weight:bold;">Tomb Raider</div>
        </div>
    </div>

    <div id="others">
        <div class="news-card item" data-category="movies">
            <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=150" alt="Movie">
            <div>
                <div style="font-weight:bold;">The Dark Knight (Movie)</div>
                <p style="font-size:12px; color:var(--text-gray); margin:5px 0;">Pata movie bora za kusisimua hapa.</p>
            </div>
        </div>
        <div class="news-card item" data-category="habari">
            <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=150" alt="Sports">
            <div>
                <div style="font-weight:bold;">Dabi ya Kariakoo (Habari)</div>
                <p style="font-size:12px; color:var(--text-gray); margin:5px 0;">Uchambuzi wa mechi ya kesho...</p>
            </div>
        </div>
    </div>
</div>

<a href="https://wa.me/255785365824" class="wa-float" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<script>
    function openNav() {
        document.getElementById("mySidebar").style.width = "260px";
        document.getElementById("overlay").style.display = "block";
    }

    function closeNav() {
        document.getElementById("mySidebar").style.width = "0";
        document.getElementById("overlay").style.display = "none";
    }

    function filterContent(category, element) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        element.classList.add('active');

        const items = document.querySelectorAll('.item');
        items.forEach(item => {
            const itemCategory = item.getAttribute('data-category');
            if (category === 'zote' || itemCategory === category) {
                item.classList.remove('hidden');
            } else {
                item.classList.add('hidden');
            }
        });
    }

    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', function() {
        const term = this.value.toLowerCase();
        const items = document.querySelectorAll('.item');
        items.forEach(item => {
            if (item.innerText.toLowerCase().includes(term)) {
                item.classList.remove('hidden');
            } else {
                item.classList.add('hidden');
            }
        });
    });
</script>

</body>
</html>
