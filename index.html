<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Khan Gaming</title>

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:white;
}

.header{
background:#000;
text-align:center;
padding:20px;
border-bottom:2px solid orange;
}

.header h1{
color:orange;
margin:5px;
}

.header p{
color:#ccc;
}

.menu-btn{
font-size:28px;
position:absolute;
left:15px;
top:25px;
cursor:pointer;
}

.sidebar{
height:100%;
width:0;
position:fixed;
top:0;
left:0;
background:#111;
overflow-x:hidden;
transition:0.3s;
padding-top:60px;
}

.sidebar a{
display:block;
padding:12px 20px;
color:white;
text-decoration:none;
font-size:18px;
}

.sidebar a:hover{
background:orange;
}

.search{
width:90%;
margin:20px auto;
display:block;
padding:15px;
border-radius:30px;
border:2px solid orange;
font-size:16px;
}

.hero img{
width:90%;
margin:10px auto;
display:block;
border-radius:15px;
}

.section{
width:90%;
margin:auto;
}

.section h2{
color:orange;
}

.games{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.game{
background:#111;
border-radius:10px;
overflow:hidden;
text-align:center;
}

.game img{
width:100%;
}

.game button{
background:orange;
border:none;
padding:10px;
margin:10px;
border-radius:8px;
cursor:pointer;
}

.trailer{
width:100%;
height:200px;
margin-top:10px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
font-size:22px;
padding:15px;
border-radius:50%;
text-decoration:none;
}

</style>
</head>

</div>

<p>Download Android, PS2 & PC Games</p>
</div>

<input class="search" placeholder="Search games...">

<div class="hero">
<img src="https://images.unsplash.com/photo-1605902711622-cfb43c4437b5">
</div>

<div class="section">

<div class="games">

<div class="game">

<a href="https://wa.me/255785365824?text=Nataka%20GTA%20V%20kutoka%20Khan%20Gaming">
<button>Download</button>
</a>
</div>

</div>
</div>

<div class="section">

<iframe class="trailer"
src="https://www.youtube.com/embed/QkkoHAzjnUs"
frameborder="0"
