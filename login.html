<!DOCTYPE html>
<html>
<head>
<title>Khan Gaming Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#000;
font-family:Arial;
color:white;
text-align:center;
}

.box{
background:#111;
width:300px;
margin:auto;
margin-top:120px;
padding:30px;
border-radius:10px;
}

input{
width:90%;
padding:10px;
margin:10px;
border:none;
border-radius:5px;
}

button{
background:orange;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>🎮 Khan Gaming</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script>

function register(){

let u=document.getElementById("username").value
let p=document.getElementById("password").value

localStorage.setItem("user",u)
localStorage.setItem("pass",p)

document.getElementById("msg").innerHTML="Account created"

}

function login(){

let u=document.getElementById("username").value
let p=document.getElementById("password").value

if(u==localStorage.getItem("user") && p==localStorage.getItem("pass")){

localStorage.setItem("login","true")

window.location="index.html"

}

else{

document.getElementById("msg").innerHTML="Wrong login"

}

}

</script>

</body>
</html>
